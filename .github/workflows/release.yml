name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: Linux ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.target }}
          manylinux: "2014"
          args: --release --locked --out dist

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: dist-linux-${{ matrix.target }}
          path: dist

  macos:
    name: macOS aarch64
    runs-on: macos-14
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: aarch64
          args: --release --locked --out dist

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: dist-macos-aarch64
          path: dist

  windows:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: x64

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: x64
          args: --release --locked --out dist

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: dist-windows-x64
          path: dist

  sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: dist

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [linux, macos, windows, sdist]
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/okpalette
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      - name: List distributions
        run: ls -la dist

      - name: Publish distributions
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  pypi-smoke:
    name: PyPI smoke test
    runs-on: ubuntu-latest
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Wait for PyPI propagation
        run: sleep 180

      - name: Resolve release version
        id: release-version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install from PyPI and import
        run: >
          uv run --no-project
          --with "okpalette==${{ steps.release-version.outputs.version }}"
          python -c "import okpalette; print(okpalette.__file__); print(okpalette.create_palette(3))"
